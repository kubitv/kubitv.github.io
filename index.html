<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Zec IPTV - Tam Kontrol</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
body, html { width: 100%; height: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; position: fixed; inset: 0; }

#app { display: grid; width: 100vw; height: 100vh; grid-template-rows: 40vh 1fr; }
@media (orientation: landscape) { #app { grid-template-rows: 1fr; grid-template-columns: 1fr 300px; } }

#video-area { background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
video { width: 100%; height: 100%; object-fit: contain; }

.controls { display: flex; flex-direction: column; background: #000; padding: 4px; height: 100%; overflow: hidden; }
input { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #222; background: #111; color: #fff; text-align: center; margin-bottom: 4px; }

#list { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
.g-title { color: #ff2a6d; font-size: 0.65rem; font-weight: bold; margin: 8px 0 2px 0; text-transform: uppercase; text-align: center; }

.item { display: flex; align-items: center; justify-content: center; padding: 4px; background: #111; margin-bottom: 2px; border-radius: 4px; gap: 6px; cursor: pointer; border: 1px solid #222; height: 32px; }
.item.active { border-color: #ff2a6d; background: #332; }
.item img { width: 20px; height: 20px; object-fit: cover; border-radius: 3px; }
.item span { font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; }
.del { color: #f00; font-weight: bold; padding: 0 5px; cursor: pointer; z-index: 10; }
</style>
</head>
<body>

<div id="app">
    <div id="video-area" onclick="if(document.fullscreenElement){document.exitFullscreen()}else{document.documentElement.requestFullscreen()}">
        <video id="v" controls playsinline></video>
    </div>
    <div class="controls">
        <input id="in" placeholder="Ara (veya 'ekle|Grup|İsim|URL|Logo' / 'sil')">
        <div id="list"></div>
    </div>
</div>

<script>
const grupSirasi = ["ulusal", "sinema ve dizi", "belgesel", "ulusal haber", "spor", "çocuk & eğitim", "yaşam & eğlence", "yabancı haber", "yabancı", "müzik"];
let data = {}, flatList = [], activeIdx = 0;

async function init() {
    const res = await fetch("https://boru-pc-tv.vercel.app/");
    const json = JSON.parse((await res.text()).match(/const channelsData = ([\s\S]*?);/)[1]);
    let custom = JSON.parse(localStorage.getItem("myCh") || "[]");
    data = {};
    Object.keys(json).forEach(g => data[g.toLowerCase()] = json[g]);
    custom.forEach(c => { let g = c.g.toLowerCase(); if(!data[g]) data[g] = []; data[g].push(c); });
    render();
}

function render() {
    const filter = document.getElementById("in").value.toLowerCase();
    const list = document.getElementById("list");
    list.innerHTML = "";
    flatList = [];
    
    grupSirasi.forEach(g => {
        let gLower = g.toLowerCase();
        if(!data[gLower]) return;
        let chans = data[gLower].filter(c => c.name.toLowerCase().includes(filter) || filter === "sil");
        if(chans.length > 0) {
            list.innerHTML += `<div class="g-title">${g}</div>`;
            chans.forEach((c) => {
                flatList.push(c);
                let idx = flatList.length - 1;
                list.innerHTML += `<div class="item ${idx === activeIdx ? 'active' : ''}" onclick="play(${idx})">
                    <img src="${c.logo || 'https://via.placeholder.com/20'}">
                    <span>${c.name}</span>
                    ${filter === "sil" ? `<span class="del" onclick="event.stopPropagation(); del('${c.name}')">✕</span>` : ''}
                </div>`;
            });
        }
    });
}

function play(idx) {
    activeIdx = idx;
    document.getElementById("v").src = flatList[idx].url;
    document.getElementById("v").play();
    render();
    document.querySelector('.active')?.scrollIntoView({block: 'center'});
}

function del(name) {
    let m = JSON.parse(localStorage.getItem("myCh") || "[]");
    localStorage.setItem("myCh", JSON.stringify(m.filter(i => i.name !== name)));
    init();
}

document.onkeydown = (e) => {
    if(e.key === "ArrowDown") { activeIdx = Math.min(activeIdx + 1, flatList.length - 1); play(activeIdx); }
    if(e.key === "ArrowUp") { activeIdx = Math.max(activeIdx - 1, 0); play(activeIdx); }
};

document.getElementById("in").onkeydown = (e) => {
    if(e.key === "Enter" && e.target.value.startsWith("ekle|")) {
        let p = e.target.value.split("|");
        let m = JSON.parse(localStorage.getItem("myCh") || "[]");
        m.push({g:p[1], name:p[2], url:p[3], logo:p[4]});
        localStorage.setItem("myCh", JSON.stringify(m));
        e.target.value = ""; init();
    }
};

document.getElementById("in").oninput = render;
init();
</script>
</body>
</html>
