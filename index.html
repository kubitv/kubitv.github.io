<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Zec IPTV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100svh;background:#000;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%}

/* PLAYER */
#video-area{display:flex;align-items:center;justify-content:center;background:#000;width:100%;height:35vh;}
video{width:100%;height:100%;object-fit:contain}

/* CONTROLS */
.controls{flex:1;display:flex;flex-direction:column;padding:4px;min-height:0}

/* INPUT */
#in{padding:6px;border-radius:8px;border:1px solid #333;background:#111;color:#fff;text-align:center;touch-action:manipulation;font-size:14px;margin-bottom:4px;width:calc(100% - 8px);}

/* LIST */
#list{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;min-height:0}

/* GRUP BAŞLIKLARI */
.g-title{color:#ff2a6d;font-weight:bold;text-transform:uppercase;margin:6px 0 4px 0;text-align:center;font-size:0.75rem}

/* ITEM */
.item{padding:6px 8px;margin:2px 0;border-radius:10px;background:#111;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;color:#fff;}
.item.active{background:#ff2a6d}
.item img{width:20px;height:20px;object-fit:contain;border-radius:2}

/* YATAY EKRAN FLEX */
@media (orientation: landscape){
#app{flex-direction:row;}
#video-area{width:70%;height:100%;}
.controls{width:30%;height:100%;border-left:1px solid #1a1a1a;}
}
</style>
</head>
<body>

<div id="app">
  <div id="video-area"></div>
  <div class="controls">
    <input id="in" placeholder="Kanal Ara / kanal sil|Ad / ekle|Grup|Ad|URL|Logo">
    <div id="list"></div>
  </div>
</div>

<script>
let data={},flatList=[],activeIdx=0,hls=null;
const grupSirasi=["ulusal","sinema ve dizi","belgesel","ulusal haber","spor","çocuk & eğitim","yaşam & eğlence","yabancı haber","yabancı","müzik"];

/* FETCH BORU TV */
async function init(){
  try{
    const res=await fetch("https://boru-pc-tv.vercel.app/");
    const text=await res.text();
    const match=text.match(/const channelsData = ([\s\S]*?);/);
    if(!match) return;
    const json=JSON.parse(match[1]);

    Object.keys(json).forEach(g=>{
      if(g.toLowerCase()==="bilgilendirme") return;
      data[g.toLowerCase()]=json[g];
    });

    render();
    if(flatList.length) play(0);
  }catch(e){console.error(e);}
}

/* GRUP SIRALAMA */
function getSortedGroups(){
  const keys=Object.keys(data);
  let ordered=[];
  grupSirasi.forEach(g=>{
    const found=keys.find(k=>k.toLowerCase()===g.toLowerCase());
    if(found) ordered.push(found);
  });
  keys.forEach(k=>{if(!ordered.includes(k)) ordered.push(k);});
  return ordered;
}

/* ITEM */
function createItem(c,idx){
  const div=document.createElement("div");
  div.className="item";
  div.innerHTML=`<img src="${c.logo||'https://via.placeholder.com/22'}"><span>${c.name}</span>`;
  div.style.justifyContent="center";

  let touchStartY=0, touchMoved=false;
  div.addEventListener("touchstart",e=>{touchStartY=e.touches[0].clientY; touchMoved=false;});
  div.addEventListener("touchmove",e=>{if(Math.abs(e.touches[0].clientY-touchStartY)>10) touchMoved=true;});
  div.addEventListener("touchend",()=>{if(!touchMoved) play(idx);});
  div.addEventListener("click",()=>play(idx));
  return div;
}

/* RENDER */
function render(filter=""){
  const list=document.getElementById("list");
  list.innerHTML=""; flatList=[];

  getSortedGroups().forEach(g=>{
    const channels=data[g].filter(c=>c.name.toLowerCase().includes(filter.toLowerCase()));
    if(channels.length===0) return;
    let title=document.createElement("div"); title.className="g-title"; title.textContent=g;
    list.appendChild(title);

    channels.forEach(c=>{
      flatList.push(c);
      let idx=flatList.length-1;
      list.appendChild(createItem(c,idx));
    });
  });
}

/* PLAY */
function play(i){
  activeIdx=i;
  const videoArea=document.getElementById("video-area");
  if(!document.getElementById("v")){
    const video=document.createElement("video");
    video.id="v"; video.controls=true; video.playsInline=true;
    videoArea.appendChild(video);
  }
  const v=document.getElementById("v");
  const url=flatList[i].url;

  if(hls){hls.destroy();}
  if(Hls.isSupported() && url.includes("m3u8")){
    hls=new Hls();
    hls.loadSource(url);
    hls.attachMedia(v);
    hls.on(Hls.Events.MANIFEST_PARSED,()=>v.play());
  } else {v.src=url; v.play();}
  
  highlight();
}

/* ACTIVE */
function highlight(){
  document.querySelectorAll(".item").forEach((el,i)=>{
    el.classList.toggle("active",i===activeIdx);
  });
}

/* KANAL EKLE / SİL */
document.getElementById("in").addEventListener("input",e=>{
  const val=e.target.value.trim();
  if(!val) return;

  // SİL
  if(val.toLowerCase().startsWith("kanal sil|")){
    const name=val.split("|")[1]?.trim();
    if(!name) return;
    Object.keys(data).forEach(g=>{ data[g]=data[g].filter(c=>c.name!==name); });
    e.target.value="";
    render(); // normal render ile kanallar gözükür
    return;
  }

  // EKLE
  if(val.toLowerCase().startsWith("ekle|")){
    const parts=val.split("|");
    if(parts.length<5) return;
    const g=parts[1].trim().toLowerCase();
    const name=parts[2].trim();
    const url=parts[3].trim();
    const logo=parts[4].trim();
    if(!data[g]) data[g]=[];
    data[g].push({name,url,logo});
    e.target.value="";
    render();
    return;
  }

  // normal arama
  render(val);
});

document.addEventListener("contextmenu",e=>e.preventDefault());
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowUp") play((activeIdx-1+flatList.length)%flatList.length);
  if(e.key==="ArrowDown") play((activeIdx+1)%flatList.length);
});

init();
</script>
</body>
</html>
