<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Zec IPTV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
:root{
    --accent:#ff2a6d;
    --bg:#0e0e12;
    --card-bg:#242429;
    --text:#ffffff;
}
html,body{
    margin:0;
    padding:0;
    height:100dvh;
    background:var(--bg);
    font-family:'Segoe UI',sans-serif;
    overflow:hidden;
}
body{
    display:flex;
    flex-direction:column;
    color:var(--text);
}
#player-wrapper{
    height:35vh;
    background:#000;
    flex-shrink:0;
    transition: height 0.3s;
}
video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:#000;
}
.list-area{
    flex:1;
    display:flex;
    flex-direction:column;
    padding:8px;
    overflow:hidden;
    min-width:120px;
}
#search-input{
    width:100%;
    padding:8px;
    border-radius:6px;
    border:1px solid #33333a;
    background:#1c1c21;
    color:white;
    margin-bottom:8px;
    box-sizing:border-box;
    font-size:0.8rem;
}
#list-container{
    flex:1;
    overflow-y:auto;
}
.item{
    padding:6px;
    margin-bottom:4px;
    background:var(--card-bg);
    border-radius:6px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    cursor:pointer;
    border:1px solid #33333a;
    white-space:nowrap;
    text-align:center;
    overflow:hidden;
    text-overflow:ellipsis;
    font-size:0.8rem;
}
.item img{
    width:20px;
    height:20px;
    border-radius:4px;
    object-fit:cover;
    background:#333;
}
.group{
    text-align:center;
    color:var(--accent);
    font-size:0.65rem;
    margin:12px 0 4px;
    font-weight:bold;
    text-transform:uppercase;
}
.delete-btn{
    margin-left:auto;
    color:red;
    cursor:pointer;
    font-weight:bold;
    padding:0 4px;
    font-size:1rem;
}
/* Aktif kanal için sadece arka plan değişimi */
.item.active{
    background:#3d2b33;
    border-color:var(--accent);
}

@media (orientation: landscape){
    body{flex-direction:row;}
    #player-wrapper{height:100dvh;flex:1;}
    .list-area{width:300px;flex:none;}
}

@media (orientation: landscape) and (max-width:768px){
    .list-area{
        width: 150px !important; 
    }
    .item{
        padding: 4px;
        gap: 5px;
        font-size: 0.75rem;
    }
    .item img{
        width: 18px;
        height: 18px;
    }
}
</style>
</head>
<body>
<div id="player-wrapper"><video id="video" controls playsinline></video></div>
<div class="list-area">
<input type="text" id="search-input" placeholder="🔍 Arama...">
<div id="list-container"></div>
</div>
<script>
let tumVeri={}, grupListesi=[], aktifGrupIndex=0, aktifKanalIndex=0;
const grupSirasi=["ulusal","sinema ve dizi","belgesel","ulusal haber","spor","çocuk & eğitim","yaşam & eğlence","yabancı haber","yabancı","müzik"];

async function veriCek(){
    try{
        const res = await fetch("https://boru-pc-tv.vercel.app/");
        const text = await res.text();
        const data = JSON.parse(text.match(/const channelsData = ([\s\S]*?);/)[1]);
        let manuel = JSON.parse(localStorage.getItem("manuelKanallar")||"[]");
        tumVeri = {};
        Object.keys(data).forEach(grup=>{
            let key = grup.toLowerCase();
            if(key==="bilgilendirme") return;
            if(!tumVeri[key]) tumVeri[key]=[];
            data[grup].forEach(k=> tumVeri[key].push(k));
        });
        manuel.forEach(k=>{
            let g=k.group.toLowerCase();
            if(g==="bilgilendirme") return;
            if(!tumVeri[g]) tumVeri[g]=[];
            tumVeri[g].push(k);
        });
        grupListesi = grupSirasi.filter(g=>tumVeri[g] && tumVeri[g].length>0);
        render();
        oynatAktif();
    }catch(e){console.log(e);}
}

function render(){
    const container=document.getElementById("list-container");
    const val=document.getElementById("search-input").value.toLowerCase();
    const silMode=val==="kanal sil";
    container.innerHTML="";
    grupListesi.forEach((grup,gIndex)=>{
        let kanallar=tumVeri[grup].filter(k=> silMode || val==="" || k.name.toLowerCase().includes(val));
        if(!kanallar.length) return;
        let gEl=document.createElement("div");
        gEl.className="group";
        gEl.innerText=grup;
        container.appendChild(gEl);
        kanallar.forEach((k,kIndex)=>{
            let el=document.createElement("div");
            el.className="item";
            el.dataset.grup = gIndex;
            el.dataset.kanal = kIndex;
            if(gIndex===aktifGrupIndex && kIndex===aktifKanalIndex) el.classList.add("active");
            el.innerHTML=`<img src="${k.logo||'https://via.placeholder.com/24'}"><span>${k.name}</span>`;
            if(silMode){
                let btn=document.createElement("span");
                btn.className="delete-btn";
                btn.innerText="✕";
                btn.onclick=(e)=>{ e.stopPropagation(); kanalSil(k.name); };
                el.appendChild(btn);
            }
            el.onclick=()=>{ aktifGrupIndex=gIndex; aktifKanalIndex=kIndex; updateActiveItem(); oynatAktif(); };
            container.appendChild(el);
        });
    });
}

function updateActiveItem(){
    document.querySelectorAll(".item").forEach(el=>el.classList.remove("active"));
    const activeEl = document.querySelector(`.item[data-grup="${aktifGrupIndex}"][data-kanal="${aktifKanalIndex}"]`);
    if(activeEl) {
        activeEl.classList.add("active");
        activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); // Odaklanmayı sağlar
    }
}

function oynatAktif(){
    let grup=grupListesi[aktifGrupIndex];
    let kanal=tumVeri[grup][aktifKanalIndex];
    if(!kanal) return;
    oynat(kanal.url);
    updateActiveItem();
}

function kanalSil(name){
    let manuel = JSON.parse(localStorage.getItem("manuelKanallar")||"[]");
    manuel = manuel.filter(k=>k.name!==name);
    localStorage.setItem("manuelKanallar",JSON.stringify(manuel));
    veriCek();
}

function oynat(url){
    if(window.hls) window.hls.destroy();
    const v=document.getElementById("video");
    if(Hls.isSupported()){ window.hls=new Hls(); window.hls.loadSource(url); window.hls.attachMedia(v); }
    else v.src=url;
    v.play().catch(()=>{});
}

function togglePlayerSize(){
    const wrapper=document.getElementById("player-wrapper");
    wrapper.style.height=(wrapper.style.height==="100dvh"?"35vh":"100dvh");
}

document.addEventListener("keydown", e=>{
    if(document.activeElement.id !== "search-input"){
        let kanalSayisi=tumVeri[grupListesi[aktifGrupIndex]]?.length||0;
        let wrapper=document.getElementById("player-wrapper");

        switch(e.keyCode){
            case 38: aktifKanalIndex=(aktifKanalIndex-1+kanalSayisi)%kanalSayisi; oynatAktif(); break;
            case 40: aktifKanalIndex=(aktifKanalIndex+1)%kanalSayisi; oynatAktif(); break;
            case 37: aktifGrupIndex=(aktifGrupIndex-1+grupListesi.length)%grupListesi.length; aktifKanalIndex=0; oynatAktif(); break;
            case 39: document.getElementById("search-input").focus(); break;
            case 13: 
                let yeniIndex = `${aktifGrupIndex}-${aktifKanalIndex}`;
                if(window.sonSecilenKanal === yeniIndex && wrapper.style.height !== "100dvh") {
                    togglePlayerSize();
                } else {
                    oynatAktif();
                    window.sonSecilenKanal = yeniIndex;
                }
                break;
            case 8: case 461: case 10009: e.preventDefault(); togglePlayerSize(); break;
        }
    }
});

document.getElementById("search-input").oninput=render;
document.getElementById("search-input").onkeydown=e=>{
    if(e.key==="Enter" && e.target.value.startsWith("ekle|")){
        let v=e.target.value.split("|");
        if(v.length>=4){
            let m=JSON.parse(localStorage.getItem("manuelKanallar")||"[]");
            m.push({group:v[1],name:v[2],url:v[3],logo:v[4]||""});
            localStorage.setItem("manuelKanallar",JSON.stringify(m));
            e.target.value=""; veriCek();
        }
    }
};

veriCek();
</script>
</body>
</html>
