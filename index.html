<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zec IPTV Ultimate Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; outline: none; }
        :root { --bg:#0d0d0d; --surface:#1a1a1a; --primary:#e50914; --text:#ffffff; }
        body { background:var(--bg); color:var(--text); font-family:sans-serif; height:100vh; overflow:hidden; }
        
        #app-grid { display:grid; height:100vh; width:100vw; overflow: hidden; }
        @media (orientation: landscape){ #app-grid{grid-template-columns:55% 45%;} }
        @media (orientation: portrait){ #app-grid{grid-template-columns:100%;grid-template-rows:auto 1fr;} }
        
        /* PC EKRAN: Liste 400px'e daraltıldı, yazı ve butonlar büyütüldü */
        @media (min-width: 1024px) { 
            #app-grid { grid-template-columns: 1fr 400px !important; }
            #header, #nav-sticky, .card { font-size: 14px !important; padding: 12px !important; }
            .btn-sort, .btn-copy { font-size: 12px !important; padding: 6px 10px !important; }
            .thin-back-btn { font-size: 12px !important; padding: 10px !important; }
        }
        
        #player-side { background:#000; padding:10px; display:flex; flex-direction:column; z-index: 50; }
        #video { width:100%; aspect-ratio:16/9; background:#000; border-radius:8px; }
        
        #list-side { background:var(--surface); display:flex; flex-direction:column; height:100%; overflow:hidden; border-left:1px solid #333; position: relative; }
        #header { padding:10px; background:#000; display:flex; flex-wrap:wrap; gap:5px; align-items:center; border-bottom: 1px solid #222; z-index: 60; }
        
        .list-wrapper { flex:1; position: relative; overflow: hidden; }
        #group-list, #channel-list { position: absolute; top:0; left:0; width:100%; height:100%; overflow-y:auto; padding:10px; scrollbar-width: thin; background: var(--surface); transition: transform 0.2s ease; }
        
        #channel-list { transform: translateX(100%); z-index: 40; }
        #channel-list.active { transform: translateX(0); }

        #nav-sticky { background: #000; padding: 8px 10px; border-bottom: 1px solid #333; display: none; z-index: 45; }

        .card { padding:8px 12px; margin-bottom:5px; background:#222; border-radius:4px; display:flex; justify-content:space-between; align-items:center; border:1px solid #333; cursor:pointer; }
        .card:hover, .card:focus { border-color: var(--primary); background: #333; }

        .thin-back-btn { width: 100%; padding: 8px; font-size: 10px; text-align: center; background: #e50914; color: white; border: none; border-radius: 3px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        
        .group-tag { font-size: 9px; color: #888; background: #111; padding: 2px 4px; border-radius: 2px; margin-left: 5px; }
        .btn-copy { display: none; background:#333; color:#fff; border:none; padding:4px 8px; border-radius:3px; font-size:9px; cursor:pointer; }
        .show-copy .btn-copy { display: block !important; }

        .btn-sort { background:#222; color:#fff; border:1px solid #444; padding:4px 6px; border-radius:3px; font-size:10px; cursor:pointer; }
        .loading { padding: 20px; text-align: center; color: var(--primary); font-size: 12px; }
    </style>
</head>
<body>

<div id="app-grid">
    <div id="player-side">
        <video id="video" controls autoplay playsinline></video>
        <input id="search" tabindex="0" placeholder="🔍 Kanal ara..." style="margin-top:10px;padding:8px;width:100%;background:#111;border:1px solid #333;color:white;border-radius:4px;" onkeyup="handleSearch()">
    </div>
    <div id="list-side">
        <div id="header">
            <span id="title" style="flex:1; font-size:12px;"><b>Zec IPTV</b></span>
            <select id="sortOrder" tabindex="0" class="btn-sort" onchange="sortAndShowGroups()">
                <option value="original">Varsayılan</option>
                <option value="az">A-Z</option>
                <option value="za">Z-A</option>
            </select>
            <input type="text" id="m3uUrl" tabindex="0" placeholder="URL..." style="padding:4px;background:#111;border:1px solid #444;color:white;width:60px;font-size:10px;">
            <button onclick="pasteUrl()" tabindex="0" style="background:#444;color:white;border:none;padding:4px 6px;cursor:pointer;font-size:12px;">📋</button>
            <button onclick="loadUrl()" tabindex="0" style="background:var(--primary);color:white;border:none;padding:4px 8px;cursor:pointer;font-size:10px;">Yükle</button>
            <button onclick="document.getElementById('fileInput').click()" tabindex="0" style="background:transparent;border:1px solid #555;color:white;padding:4px 8px;cursor:pointer;font-size:10px;">Dosya</button>
            <input type="file" id="fileInput" hidden accept=".m3u">
        </div>
        
        <div id="nav-sticky">
            <button class="thin-back-btn" tabindex="0" onclick="closeChannelList()">⬅ ANA MENÜYE DÖN</button>
        </div>

        <div class="list-wrapper">
            <div id="group-list"></div>
            <div id="channel-list"></div>
        </div>
    </div>
</div>

<script>
let allData = {}, originalGroupOrder = [], hls = null, searchTimer = null;
const v = document.getElementById("video"), groupContainer = document.getElementById("group-list"), 
      channelContainer = document.getElementById("channel-list"), nav = document.getElementById("nav-sticky");

// TV KUMANDA DESTEĞİ
document.addEventListener('keydown', (e) => {
    if(['ArrowUp', 'ArrowDown'].includes(e.key)) {
        const focusable = Array.from(document.querySelectorAll('input, button, select, .card')).filter(el => el.offsetParent !== null);
        let index = focusable.indexOf(document.activeElement);
        if(e.key === 'ArrowDown') focusable[(index + 1) % focusable.length].focus();
        if(e.key === 'ArrowUp') focusable[(index - 1 + focusable.length) % focusable.length].focus();
    }
});

async function pasteUrl() {
    try { const text = await navigator.clipboard.readText(); document.getElementById("m3uUrl").value = text; } 
    catch(e) { alert("Tarayıcı izni gerekli."); }
}

function parseM3U(text) {
    allData = {}; originalGroupOrder = [];
    groupContainer.innerHTML = '<div class="loading">İşleniyor...</div>';
    const lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l !== "");
    let i = 0;
    function chunk() {
        let limit = i + 5000;
        while (i < lines.length && i < limit) {
            if (lines[i].startsWith("#EXTINF")) {
                let group = lines[i].match(/group-title="(.*?)"/)?.[1] || "Diğer";
                let name = lines[i].split(",")[1]?.trim() || "İsimsiz Kanal";
                let url = lines[i+1]?.startsWith("#") ? lines[i+2] : lines[i+1];
                if (url && url.startsWith("http")) {
                    if (!allData[group]) { allData[group] = []; originalGroupOrder.push(group); }
                    allData[group].push({ name, url, group });
                }
            }
            i++;
        }
        if (i < lines.length) setTimeout(chunk, 0); else sortAndShowGroups();
    }
    chunk();
}

function sortAndShowGroups() {
    groupContainer.innerHTML = "";
    const sortVal = document.getElementById("sortOrder").value;
    let groups = [...originalGroupOrder];
    if (sortVal === "az") groups.sort((a, b) => a.localeCompare(b));
    else if (sortVal === "za") groups.sort((a, b) => b.localeCompare(a));
    groups.forEach(g => {
        const div = document.createElement("div");
        div.className = "card"; div.tabIndex = 0;
        div.innerHTML = `<span>📁 ${g}</span> <small style="color:#666">${allData[g].length}</small>`;
        div.onclick = () => renderChannelList(allData[g]);
        groupContainer.appendChild(div);
    });
    closeChannelList();
}

function renderChannelList(channels) {
    channelContainer.innerHTML = "";
    channels.slice(0, 1000).forEach(ch => {
        const div = document.createElement("div");
        div.className = "card"; div.tabIndex = 0;
        div.innerHTML = `<span>${ch.name}</span><button class="btn-copy" onclick="event.stopPropagation();copy('${ch.url}')">KOPYALA</button>`;
        div.onclick = () => play(ch.url);
        channelContainer.appendChild(div);
    });
    channelContainer.classList.add("active");
    nav.style.display = "block";
}

function closeChannelList() { channelContainer.classList.remove("active"); nav.style.display = "none"; }

function handleSearch() {
    const val = document.getElementById("search").value.toLowerCase();
    if (val === "kubi") { document.body.classList.add("show-copy"); document.getElementById("search").value = ""; return; }
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
        channelContainer.innerHTML = "";
        let count = 0;
        for (let g of originalGroupOrder) {
            for (let ch of allData[g]) {
                if (ch.name.toLowerCase().includes(val)) {
                    const div = document.createElement("div");
                    div.className = "card"; div.tabIndex = 0;
                    div.innerHTML = `<span>${ch.name} <span class="group-tag">${ch.group}</span></span><button class="btn-copy" onclick="event.stopPropagation();copy('${ch.url}')">KOPYALA</button>`;
                    div.onclick = () => play(ch.url);
                    channelContainer.appendChild(div);
                    if (++count >= 200) break;
                }
            }
        }
        channelContainer.classList.add("active"); nav.style.display = "block";
    }, 400);
}

function play(url) {
    if (hls) hls.destroy();
    if (Hls.isSupported()) { hls = new Hls(); hls.loadSource(url); hls.attachMedia(v); v.play(); }
    else { v.src = url; v.play(); }
}

function copy(url) { navigator.clipboard.writeText(url).then(() => alert("Kopyalandı!")); }

document.getElementById("fileInput").addEventListener("change", e => {
    const reader = new FileReader(); reader.onload = e => parseM3U(e.target.result); reader.readAsText(e.target.files[0]);
});

async function loadUrl() {
    const url = document.getElementById('m3uUrl').value;
    if(!url) return;
    try { groupContainer.innerHTML = '<div class="loading">İndiriliyor...</div>'; const res = await fetch(url); parseM3U(await res.text()); } 
    catch(e) { alert("Hata!"); }
}
</script>
</body>
</html>
