<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Zec IPTV Pro</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100svh;background:#000;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%}
#video-area{display:flex;align-items:center;justify-content:center;background:#000;width:100%;height:35vh;min-height:35vh;}
video{width:100%;height:100%;object-fit:contain;}
.controls{flex:1;display:flex;flex-direction:column;padding:4px;min-height:0}
#in{padding:6px;border-radius:8px;border:1px solid #333;background:#111;color:#fff;text-align:center;touch-action:manipulation;font-size:14px;margin-bottom:4px;width:calc(100% - 8px);}
#list{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;min-height:0}
.g-title{color:#ff2a6d;font-weight:bold;text-transform:uppercase;margin:6px 0 4px 0;text-align:center;font-size:0.75rem}
.item{padding:6px 8px;margin:2px 0;border-radius:10px;background:#111;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;color:#fff;position:relative;}
.item.active{background:#ff2a6d}
.item img{width:20px;height:20px;object-fit:contain;border-radius:2}
.item .del-btn{position:absolute;right:5px;top:50%;transform:translateY(-50%);background:red;color:#fff;padding:2px 6px;border-radius:4px;font-size:12px;cursor:pointer;display:none}

/* PC ve TV geniş ekran */
@media (min-width:1024px){
  #app{flex-direction:row;height:100vh;}
  #video-area{width:75%;height:100vh;}
  .controls{width:25%;height:100vh;border-left:1px solid #1a1a1a;}
}

/* Mobil yatay ekran */
@media (orientation: landscape) and (max-width:1023px){
  #app{flex-direction:row;height:100vh;}
  #video-area{width:70%;height:100%;}
  .controls{width:30%;height:100%;border-left:1px solid #1a1a1a;}
}
</style>
</head>
<body>
<div id="app">
  <div id="video-area"></div>
  <div class="controls">
    <input id="in" placeholder="Kanal Ara....">
    <div id="list"></div>
  </div>
</div>

<script>
let data={},flatList=[],activeIdx=0,hls=null;
let manualChannels = JSON.parse(localStorage.getItem("myCh")||"[]");

const defaultChannels=[
  { g:"spor", name:"bein sports 1(A)", url:"https://betconnectstreamserver1001.site/601/mono.m3u8", logo:"https://images.seeklogo.com/logo-png/48/2/bein-sports-1-logo-png_seeklogo-481583.png", manual:false },
  { g:"spor", name:"beIN SPORTS 1", url:"https://api.codetabs.com/v1/proxy/?quest=https://andro.2385437.xyz/checklist/receptestt.m3u8", logo:"https://images.seeklogo.com/logo-png/48/2/bein-sports-1-logo-png_seeklogo-481583.png", manual:false }
];

const grupSirasi=["ulusal","sinema ve dizi","belgesel","ulusal haber","spor","çocuk & eğitim","yaşam & eğlence","yabancı haber","yabancı","müzik"];
let silMode=false;
let focusMode="list";

async function init(){
  try{
    const res=await fetch("https://boru-pc-tv.vercel.app/");
    const text=await res.text();
    const match=text.match(/const channelsData = ([\s\S]*?);/);
    if(!match) return;
    const json=JSON.parse(match[1]);

    Object.keys(json).forEach(g=>{
      if(g.toLowerCase()==="bilgilendirme") return;
      data[g.toLowerCase()]=json[g];
    });

    defaultChannels.forEach(c=>{
      const g=c.g.toLowerCase();
      if(!data[g]) data[g]=[];
      if(!data[g].some(x=>x.url===c.url)) data[g].push(c);
    });

    manualChannels.forEach(c=>{
      const g=c.g.toLowerCase();
      if(!data[g]) data[g]=[];
      if(!data[g].some(x=>x.url===c.url)) data[g].push({...c,manual:true});
    });

    render();
    if(flatList.length) play(0);
  }catch(e){console.error(e);}
}

function getSortedGroups(){
  const keys=Object.keys(data);
  let ordered=[];
  grupSirasi.forEach(g=>{
    const found=keys.find(k=>k.toLowerCase()===g.toLowerCase());
    if(found) ordered.push(found);
  });
  keys.forEach(k=>{if(!ordered.includes(k)) ordered.push(k);});
  return ordered;
}

function createItem(c,idx){
  const div=document.createElement("div");
  div.className="item";
  div.innerHTML=`<img src="${c.logo||'https://via.placeholder.com/22'}"><span>${c.name}</span>`;
  div.style.justifyContent="center";

  if(silMode && c.manual){
    const del=document.createElement("div"); del.className="del-btn"; del.textContent="Sil";
    del.style.display="block";
    del.onclick=(e)=>{
      e.stopPropagation();
      removeManual(c);
    };
    div.appendChild(del);
  }

  let touchStartY=0, touchMoved=false;
  div.addEventListener("touchstart",e=>{touchStartY=e.touches[0].clientY; touchMoved=false;});
  div.addEventListener("touchmove",e=>{if(Math.abs(e.touches[0].clientY-touchStartY)>10) touchMoved=true;});
  div.addEventListener("touchend",()=>{
    if(!touchMoved){
      play(idx); 
      input.value=""; 
      render(); 
      focusMode="list"; 
      highlight(); 
    }
  });
  div.addEventListener("click",()=>{
    play(idx); 
    input.value=""; 
    render(); 
    focusMode="list"; 
    highlight();
  });
  return div;
}

function render(filter=""){
  const list=document.getElementById("list");
  list.innerHTML=""; flatList=[];

  const filterText = filter.toLowerCase();

  getSortedGroups().forEach(g=>{
    let channels = data[g];
    if(filterText) channels = channels.filter(c=>c.name.toLowerCase().includes(filterText));
    if(channels.length===0) return;
    let title=document.createElement("div"); title.className="g-title"; title.textContent=g;
    list.appendChild(title);

    channels.forEach(c=>{
      flatList.push(c);
      let idx=flatList.length-1;
      list.appendChild(createItem(c,idx));
    });
  });
}

function play(i){
  activeIdx=i;
  const videoArea=document.getElementById("video-area");
  if(!document.getElementById("v")){
    const video=document.createElement("video");
    video.id="v"; video.controls=true; video.playsInline=true;
    videoArea.appendChild(video);
  }
  const v=document.getElementById("v");
  const url=flatList[i].url;

  if(hls){hls.destroy();}
  if(Hls.isSupported() && url.includes("m3u8")){
    hls=new Hls();
    hls.loadSource(url);
    hls.attachMedia(v);
    hls.on(Hls.Events.MANIFEST_PARSED,()=>v.play());
  } else {v.src=url; v.play();}
  
  highlight();
}

function highlight(){
  const list=document.getElementById("list");
  document.querySelectorAll(".item").forEach((el,i)=>{
    el.classList.toggle("active", i===activeIdx);
    if(i===activeIdx){
      const listRect=list.getBoundingClientRect();
      const elRect=el.getBoundingClientRect();
      const offset = elRect.top - listRect.top - (list.clientHeight/2 - el.clientHeight/2);
      list.scrollTop += offset;
    }
  });
}

function removeManual(c){
  manualChannels = manualChannels.filter(m=>m.url!==c.url);
  localStorage.setItem("myCh",JSON.stringify(manualChannels));
  Object.keys(data).forEach(g=>{
    data[g]=data[g].filter(x=>!(x.manual && x.url===c.url));
  });
  render();
}

const input = document.getElementById("in");
input.addEventListener("input",e=>{
  const val=e.target.value.trim();
  if(!val) return;

  if(val.toLowerCase()==="kanal sil"){
    silMode=true; e.target.value=""; render(); return;
  } else silMode=false;

  if(val.toLowerCase().startsWith("ekle|")){
    const parts=val.split("|");
    if(parts.length<5) return;
    const g=parts[1].trim().toLowerCase();
    const name=parts[2].trim();
    const url=parts[3].trim();
    const logo=parts[4].trim();
    if(!data[g]) data[g]=[];
    const obj={name,url,logo,manual:true,g:g};
    data[g].push(obj);
    manualChannels.push(obj);
    localStorage.setItem("myCh",JSON.stringify(manualChannels));
    e.target.value=""; render(); return;
  }

  render(val);
});

document.addEventListener("contextmenu",e=>e.preventDefault());

let lastInputWasKeyboard=false;
document.addEventListener("keydown", e=>{
  lastInputWasKeyboard=true;

  if(e.key==="ArrowUp"){
    if(focusMode==="list"){
      activeIdx = (activeIdx - 1 + flatList.length) % flatList.length;
      play(activeIdx);
    }
  }

  if(e.key==="ArrowDown"){
    if(focusMode==="list"){
      activeIdx = (activeIdx + 1) % flatList.length;
      play(activeIdx);
    }
  }

  if(e.key==="Enter"){
    const video=document.getElementById("v");
    if(video && lastInputWasKeyboard){if(!document.fullscreenElement) video.requestFullscreen();}
  }
});

document.addEventListener("mousedown",()=>{ lastInputWasKeyboard=false; });
document.addEventListener("touchstart",()=>{ lastInputWasKeyboard=false; });

init();
</script>
</body>
</html>
