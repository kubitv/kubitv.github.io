<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zec IPTV Ultimate</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root { --bg:#0d0d0d; --surface:#1a1a1a; --primary:#e50914; --text:#ffffff; --accent:#333; }
        body { background:var(--bg); color:var(--text); font-family:'Segoe UI', sans-serif; height:100vh; overflow:hidden; }
        #app-grid { display:grid; height:100vh; width:100vw; }
        @media (orientation: landscape){ #app-grid{grid-template-columns:55% 45%;} }
        @media (orientation: portrait){ #app-grid{grid-template-columns:100%;grid-template-rows:auto 1fr;} }
        
        #player-side { background:#000; padding:15px; display:flex; flex-direction:column; }
        #video { width:100%; aspect-ratio:16/9; background:#000; border-radius:12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        #list-side { background:var(--surface); display:flex; flex-direction:column; overflow:hidden; border-left:1px solid #333; }
        #header { padding:15px; background:linear-gradient(to bottom, #111, #000); display:flex; flex-wrap:wrap; gap:8px; align-items:center; border-bottom:1px solid #333; }
        #list-container { flex:1; overflow-y:auto; padding:15px; scrollbar-width: thin; position: relative; }
        
        .card { padding:14px; margin-bottom:8px; background:rgba(255,255,255,0.05); border-radius:8px; display:flex; justify-content:space-between; align-items:center; border:1px solid rgba(255,255,255,0.1); cursor:pointer; transition: 0.3s; }
        .card:hover { background:rgba(255,255,255,0.08); border-color:var(--primary); }
        .active-item { border: 1px solid var(--primary) !important; background: rgba(229, 9, 20, 0.15) !important; }
        .sticky-back { position: sticky; top: 0; z-index: 100; background: var(--primary) !important; border: none !important; justify-content: center !important; font-weight: bold; margin-bottom: 12px; }
        .btn-copy { background:var(--accent); color:#fff; border:none; padding:6px 12px; border-radius:6px; font-size:10px; font-weight:bold; cursor:pointer; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="app-grid">
    <div id="player-side">
        <video id="video" controls autoplay playsinline></video>
        <input id="search" placeholder="🔍 Kanal ara..." style="margin-top:15px;padding:12px;width:100%;background:#111;border:1px solid #333;color:white;border-radius:8px;" onkeyup="handleSearch()">
    </div>
    <div id="list-side">
        <div id="header">
            <span id="title" style="flex:1; font-size: 1.1em;"><b>Kategoriler</b></span>
            <input type="text" id="m3uUrl" placeholder="URL..." style="padding:6px;background:#111;border:1px solid #444;color:white;border-radius:4px;width:80px;">
            <button onclick="loadUrl()" style="background:var(--primary);color:white;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;">Yükle</button>
            <button onclick="document.getElementById('fileInput').click()" style="background:transparent;border:1px solid #555;color:white;padding:6px 12px;border-radius:4px;cursor:pointer;">Dosya Seç</button>
            <input type="file" id="fileInput" hidden accept=".m3u">
        </div>
        <div id="list-container"></div>
    </div>
</div>

<script>
let allData = {}, currentGroup = null, timer = null, hls = null;
const v = document.getElementById("video");

function resetData() { allData = {}; currentGroup = null; document.getElementById("list-container").innerHTML = ""; }

// Video akışını durduran yeni fonksiyon
function stopPlayer() {
    if (hls) { hls.destroy(); hls = null; }
    v.pause();
    v.src = "";
    v.load();
}

function goBack() {
    stopPlayer(); // Video durduruldu
    showGroups();
}

document.getElementById("fileInput").addEventListener("change", e => {
    if(!e.target.files[0]) return;
    const reader = new FileReader();
    reader.onload = e => { resetData(); parseM3U(e.target.result); };
    reader.readAsText(e.target.files[0]);
});

async function loadUrl() {
    const url = document.getElementById('m3uUrl').value;
    if(!url) return alert("Lütfen bir URL girin!");
    try {
        resetData();
        const response = await fetch(url);
        const text = await response.text();
        parseM3U(text);
    } catch(err) { alert("URL yüklenemedi. CORS engeli olabilir."); }
}

function parseM3U(text) {
    text.split("\n").forEach((line, i, arr) => {
        if (line.startsWith("#EXTINF")) {
            const group = line.match(/group-title="(.*?)"/)?.[1] || "Diğer";
            const name = line.split(",")[1]?.trim();
            const url = arr[i+1]?.trim();
            if (!allData[group]) allData[group] = [];
            allData[group].push({ name, url });
        }
    });
    showGroups();
}

function showGroups() {
    currentGroup = null;
    document.getElementById("title").innerText = "Kategoriler";
    const container = document.getElementById("list-container");
    container.innerHTML = "";
    const frag = document.createDocumentFragment();
    Object.keys(allData).forEach(g => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `<span>📁 ${g}</span> <small style="color:#666">${allData[g].length} Kanal</small>`;
        div.onclick = () => showChannels(g);
        frag.appendChild(div);
    });
    container.appendChild(frag);
}

function showChannels(g) {
    currentGroup = g;
    document.getElementById("title").innerText = g;
    const container = document.getElementById("list-container");
    container.innerHTML = `<div class="card sticky-back" onclick="goBack()">⬅ GERİ DÖN</div>`;
    
    const frag = document.createDocumentFragment();
    allData[g].forEach(ch => {
        const div = document.createElement("div");
        div.className = "card channel-item";
        div.dataset.name = ch.name.toLowerCase();
        div.innerHTML = `<span>${ch.name}</span><button class="btn-copy" onclick="event.stopPropagation();copy('${ch.url}')">Link Kopyala</button>`;
        div.onclick = (e) => play(ch.url, e.currentTarget);
        frag.appendChild(div);
    });
    container.appendChild(frag);
}

function play(url, element) {
    document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active-item'));
    if(element) element.classList.add('active-item');
    if (hls) hls.destroy();
    if (Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(v);
        v.play();
    } else { v.src = url; v.play(); }
}

function handleSearch() { clearTimeout(timer); timer = setTimeout(filter, 300); }
function filter() {
    const val = document.getElementById("search").value.toLowerCase();
    if (currentGroup) {
        document.querySelectorAll(".channel-item").forEach(el => el.style.display = el.dataset.name.includes(val) ? "flex" : "none");
    } else {
        if (val === "") { showGroups(); return; }
        const container = document.getElementById("list-container");
        container.innerHTML = `<div class="card sticky-back" onclick="goBack()">⬅ ARAMADAN ÇIK</div>`;
        const frag = document.createDocumentFragment();
        let count = 0;
        Object.keys(allData).forEach(g => {
            allData[g].forEach(ch => {
                if (ch.name.toLowerCase().includes(val) && count < 500) {
                    const div = document.createElement("div");
                    div.className = "card";
                    div.innerHTML = `<span>${ch.name} <small style="color:#666">(${g})</small></span><button class="btn-copy" onclick="event.stopPropagation();copy('${ch.url}')">Link Kopyala</button>`;
                    div.onclick = (e) => play(ch.url, e.currentTarget);
                    frag.appendChild(div); count++;
                }
            });
        });
        container.appendChild(frag);
    }
}
function copy(url) { navigator.clipboard.writeText(url); alert("Link panoya kopyalandı!"); }
</script>
</body>
</html>
