<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Zec IPTV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
    :root{ --accent:#ff2a6d; --bg:#0e0e12; --card-bg:#242429; --text:#ffffff; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
    
    html, body {
        margin: 0; padding: 0; width: 100vw; height: 100dvh;
        background: var(--bg); color: var(--text);
        font-family: sans-serif; overflow: hidden;
    }

    body { display: flex; flex-direction: column; }

    /* Player Alanı */
    #player-wrapper { height: 35dvh; background: #000; flex-shrink: 0; transition: height 0.3s; position: relative; }
    video { width: 100%; height: 100%; object-fit: contain; }

    /* Liste Alanı */
    .list-area { flex: 1; display: flex; flex-direction: column; padding: 4px; overflow: hidden; width: 100vw; }
    
    #search-input { 
        width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #333; 
        background: #1c1c21; color: white; font-size: 0.8rem; margin-bottom: 4px;
    }

    #list-container { flex: 1; overflow-y: auto; overflow-x: hidden; scroll-behavior: smooth; }
    
    /* KANAL SATIRI: Hem Dar Hem Ortalı */
    .item { 
        padding: 6px; margin-bottom: 3px; background: var(--card-bg); 
        border-radius: 4px; display: flex; align-items: center; 
        justify-content: center; /* İçeriği yatayda ortalar */
        gap: 6px; cursor: pointer; border: 2px solid transparent; 
        font-size: 0.75rem; white-space: nowrap; overflow: hidden;
    }
    .item img { width: 18px; height: 18px; border-radius: 2px; object-fit: cover; flex-shrink: 0; }
    .item span { overflow: hidden; text-overflow: ellipsis; flex-shrink: 1; }
    .item.active { border-color: var(--accent); background: #35252b; }
    
    .delete-btn { color: #ff4444; font-weight: bold; cursor: pointer; display: none; margin-left: 5px; }
    .sil-modu .delete-btn { display: inline-block; }

    .group-label { text-align: center; color: var(--accent); font-size: 0.6rem; margin: 8px 0 3px; font-weight: bold; text-transform: uppercase; opacity: 0.7; }

    /* MOBİL YATAY (LANDSCAPE) - Maksimum Daraltılmış ve Ortalı */
    @media (orientation: landscape) and (max-width: 899px){ 
        body { flex-direction: row; } 
        #player-wrapper { height: 100dvh; flex: 1; } 
        /* Genişlik 130px'e sabitlendi, esnemesi engellendi */
        .list-area { 
            width: 130px !important; min-width: 130px !important; max-width: 130px !important; 
            flex-shrink: 0; border-left: 1px solid #333; padding: 2px;
        } 
        .item { padding: 4px; font-size: 0.65rem; gap: 4px; }
        .item img { width: 14px; height: 14px; }
    }
    
    /* TV / PC - Büyük Ekran */
    @media (min-width: 900px){
        body { flex-direction: row; }
        #player-wrapper { height: 100dvh; flex: 1; }
        .list-area { width: 350px !important; min-width: 350px !important; padding: 12px; }
        .item { padding: 10px; font-size: 1rem; gap: 12px; }
        .item img { width: 24px; height: 24px; }
    }
</style>
</head>
<body>

<div id="player-wrapper"><video id="video" autoplay playsinline></video></div>
<div class="list-area">
    <input type="text" id="search-input" placeholder="🔍 Ara...">
    <div id="list-container"></div>
</div>

<script>
// GRUP SIRALAMASI (Küçük harf duyarlı)
const grupSiralamasi = ["ulusal", "spor", "sinema ve dizi", "belgesel", "çocuk & eğitim", "ulusal haber", "yaşam & eğlence", "müzik", "yabancı haber", "yabancı"];

const _0xUrl = atob("aHR0cHM6Ly9ib3J1LXBjLXR2LnZlcmNlbC5hcHAv");
let tumData = {}, aktifGrupIdx = 0, aktifKanalIdx = 0;

async function veriYukle() {
    try {
        const res = await fetch(_0xUrl);
        const text = await res.text();
        const onlineData = JSON.parse(text.match(/const channelsData = ([\s\S]*?);/)[1]);
        let localData = JSON.parse(localStorage.getItem("zec_kanallar") || "[]");
        
        tumData = {};
        Object.keys(onlineData).forEach(g => {
            if(g.toLowerCase() !== "bilgilendirme") tumData[g.toLowerCase()] = onlineData[g];
        });
        localData.forEach(k => {
            let g = k.group.toLowerCase();
            if(!tumData[g]) tumData[g] = [];
            tumData[g].push(k);
        });

        render();
        oynat();
    } catch(e) { console.error(e); }
}

function render() {
    const container = document.getElementById("list-container");
    const ara = document.getElementById("search-input").value.toLowerCase();
    const isSilMode = ara === "kanal sil";
    container.innerHTML = "";
    container.classList.toggle("sil-modu", isSilMode);

    grupSiralamasi.forEach(grupKey => {
        if(!tumData[grupKey]) return;
        let kanallar = tumData[grupKey].filter(k => k.name.toLowerCase().includes(ara) || isSilMode || ara.startsWith("ekle|"));
        if(kanallar.length === 0) return;

        let gDiv = document.createElement("div");
        gDiv.className = "group-label"; gDiv.innerText = grupKey;
        container.appendChild(gDiv);

        kanallar.forEach(k => {
            let el = document.createElement("div");
            el.className = "item";
            el.innerHTML = `<img src="${k.logo || ''}" onerror="this.src='https://via.placeholder.com/20?text=?'"><span>${k.name}</span><div class="delete-btn" onclick="event.stopPropagation(); kanalSil('${k.name}')">✕</div>`;
            el.onclick = () => { 
                aktifGrupIdx = grupSiralamasi.indexOf(grupKey);
                aktifKanalIdx = tumData[grupKey].indexOf(k);
                updateFocus();
                oynat();
            };
            container.appendChild(el);
        });
    });
    updateFocus();
}

function updateFocus() {
    const items = document.querySelectorAll(".item");
    const currentKanal = tumData[grupSiralamasi[aktifGrupIdx]]?.[aktifKanalIdx];
    items.forEach(el => {
        const active = currentKanal && el.innerText.includes(currentKanal.name);
        el.classList.toggle("active", active);
        if(active) el.scrollIntoView({ block: "center", behavior: "smooth" });
    });
}

function oynat() {
    const kanal = tumData[grupSiralamasi[aktifGrupIdx]]?.[aktifKanalIdx];
    if(!kanal) return;
    const v = document.getElementById("video");
    if(window.hls) window.hls.destroy();
    if(Hls.isSupported()){
        window.hls = new Hls(); window.hls.loadSource(kanal.url); window.hls.attachMedia(v);
    } else v.src = kanal.url;
}

function kanalSil(name) {
    let local = JSON.parse(localStorage.getItem("zec_kanallar") || "[]");
    local = local.filter(k => k.name !== name);
    localStorage.setItem("zec_kanallar", JSON.stringify(local));
    veriYukle();
}

function kanalEkle(str) {
    const p = str.split("|");
    if(p.length < 4) return alert("Hata! ekle|Grup|Ad|Link|Logo");
    let local = JSON.parse(localStorage.getItem("zec_kanallar") || "[]");
    local.push({ group: p[1], name: p[2], url: p[3], logo: p[4] || "" });
    localStorage.setItem("zec_kanallar", JSON.stringify(local));
    document.getElementById("search-input").value = "";
    veriYukle();
}

document.getElementById("search-input").onkeydown = (e) => {
    if(e.keyCode === 13 && e.target.value.startsWith("ekle|")) kanalEkle(e.target.value);
};
document.getElementById("search-input").oninput = render;

// Kumanda Kontrolleri
document.addEventListener("keydown", e => {
    if(document.activeElement.id === "search-input") return;
    if([8, 461, 10009].includes(e.keyCode)) { // Geri
        e.preventDefault();
        const p = document.getElementById("player-wrapper");
        p.style.height = (p.style.height === "100dvh" ? "35dvh" : "100dvh");
    }
    if(e.keyCode === 38 || e.keyCode === 40) { // Yukarı - Aşağı
        e.preventDefault();
        if(e.keyCode === 38) {
            aktifKanalIdx--;
            if(aktifKanalIdx < 0) {
                aktifGrupIdx = (aktifGrupIdx - 1 + grupSiralamasi.length) % grupSiralamasi.length;
                aktifKanalIdx = tumData[grupSiralamasi[aktifGrupIdx]].length - 1;
            }
        } else {
            aktifKanalIdx++;
            if(aktifKanalIdx >= tumData[grupSiralamasi[aktifGrupIdx]].length) {
                aktifGrupIdx = (aktifGrupIdx + 1) % grupSiralamasi.length;
                aktifKanalIdx = 0;
            }
        }
        updateFocus(); oynat();
    }
});

veriYukle();
</script>
</body>
</html>
