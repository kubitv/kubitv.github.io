<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Zec IPTV - Tam İşlevsel</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
:root{ --accent:#ff2a6d; --bg:#0e0e12; --card-bg:#242429; --text:#ffffff; }
html,body{ margin:0; padding:0; height:100dvh; background:var(--bg); font-family:'Segoe UI',sans-serif; overflow:hidden; }
body{ display:flex; flex-direction:column; color:var(--text); }
#player-wrapper{ height:35vh; background:#000; flex-shrink:0; transition: height 0.3s; }
video{ width:100%; height:100%; object-fit:contain; background:#000; }
.list-area{ flex:1; display:flex; flex-direction:column; padding:8px; overflow:hidden; min-width:120px; }
#search-input{ width:100%; padding:8px; border-radius:6px; border:1px solid #33333a; background:#1c1c21; color:white; margin-bottom:8px; box-sizing:border-box; font-size:0.8rem; }
#list-container{ flex:1; overflow-y:auto; }
.item{ padding:6px; margin-bottom:4px; background:var(--card-bg); border-radius:6px; display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer; border:1px solid #33333a; white-space:nowrap; text-align:center; overflow:hidden; text-overflow:ellipsis; font-size:0.8rem; }
.item img{ width:20px; height:20px; border-radius:4px; object-fit:cover; background:#333; }
.group{ text-align:center; color:var(--accent); font-size:0.65rem; margin:12px 0 4px; font-weight:bold; text-transform:uppercase; }
.item.active{ border-color:var(--accent); background:#35252b; }
.delete-btn{ margin-left:auto; color:red; cursor:pointer; font-weight:bold; padding:0 4px; }
@media (orientation: landscape){ body{flex-direction:row;} #player-wrapper{height:100dvh;flex:1;} .list-area{width:300px;flex:none;} }
</style>
</head>
<body>
<div id="player-wrapper"><video id="video" controls playsinline></video></div>
<div class="list-area">
<input type="text" id="search-input" placeholder="🔍 Arama...">
<div id="list-container"></div>
</div>
<script>
let tumVeri={}, grupListesi=[], aktifGrupIndex=0, aktifKanalIndex=0;
const grupSirasi=["ulusal","sinema ve dizi","belgesel","ulusal haber","spor","çocuk & eğitim","yaşam & eğlence","yabancı haber","yabancı","müzik"];

async function veriCek(){
    try{
        const res = await fetch("https://boru-pc-tv.vercel.app/");
        const text = await res.text();
        const data = JSON.parse(text.match(/const channelsData = ([\s\S]*?);/)[1]);
        let manuel = JSON.parse(localStorage.getItem("manuelKanallar")||"[]");
        
        tumVeri = {};
        Object.keys(data).forEach(g=>{
            let key = g.toLowerCase();
            if(key==="bilgilendirme") return;
            if(!tumVeri[key]) tumVeri[key]=[];
            tumVeri[key].push(...data[g]);
        });
        
        manuel.forEach(k=>{
            let g=k.group.toLowerCase();
            if(!tumVeri[g]) tumVeri[g]=[];
            tumVeri[g].push(k);
        });

        grupListesi = grupSirasi.filter(g => tumVeri[g]);
        render();
        oynatAktif();
    }catch(e){console.log(e);}
}

function render(){
    const container=document.getElementById("list-container");
    const val=document.getElementById("search-input").value.toLowerCase();
    const silMode = (val === "kanal sil");
    container.innerHTML="";
    
    grupListesi.forEach((grup, gIdx)=>{
        let kanallar = tumVeri[grup].filter(k => silMode || val === "" || k.name.toLowerCase().includes(val));
        if(!kanallar.length) return;
        
        let gEl=document.createElement("div"); gEl.className="group"; gEl.innerText=grup;
        container.appendChild(gEl);
        
        kanallar.forEach((k, kIdx)=>{
            let el=document.createElement("div");
            el.className="item";
            el.innerHTML=`<img src="${k.logo||'https://via.placeholder.com/24'}"><span>${k.name}</span>`;
            if(silMode){
                let btn=document.createElement("span"); btn.className="delete-btn"; btn.innerText="✕";
                btn.onclick=(e)=>{ e.stopPropagation(); kanalSil(k.name); };
                el.appendChild(btn);
            }
            el.onclick=()=>{ aktifGrupIndex=grupListesi.indexOf(grup); aktifKanalIndex=tumVeri[grup].indexOf(k); updateActive(); oynatAktif(); };
            container.appendChild(el);
        });
    });
    updateActive();
}

function kanalSil(name){
    let m = JSON.parse(localStorage.getItem("manuelKanallar")||"[]");
    m = m.filter(k=>k.name!==name);
    localStorage.setItem("manuelKanallar", JSON.stringify(m));
    veriCek();
}

function updateActive(){
    const items = document.querySelectorAll(".item");
    items.forEach(el => {
        // Basit görsel aktiflik kontrolü
        el.classList.toggle("active", el.innerText.includes(tumVeri[grupListesi[aktifGrupIndex]][aktifKanalIndex].name));
        if(el.classList.contains("active")) el.scrollIntoView({ block: "nearest", behavior: "smooth" });
    });
}

function oynatAktif(){
    let kanal = tumVeri[grupListesi[aktifGrupIndex]][aktifKanalIndex];
    if(!kanal) return;
    const v=document.getElementById("video");
    if(window.hls) window.hls.destroy();
    if(Hls.isSupported()){ window.hls=new Hls(); window.hls.loadSource(kanal.url); window.hls.attachMedia(v); }
    else v.src=kanal.url;
    v.play().catch(()=>{});
}

document.getElementById("search-input").oninput = render;
document.getElementById("search-input").onkeydown = e => {
    if(e.key==="Enter" && e.target.value.startsWith("ekle|")){
        let v = e.target.value.split("|");
        if(v.length>=4){
            let m = JSON.parse(localStorage.getItem("manuelKanallar")||"[]");
            m.push({group:v[1], name:v[2], url:v[3], logo:v[4]||""});
            localStorage.setItem("manuelKanallar", JSON.stringify(m));
            e.target.value=""; veriCek();
        }
    }
};

document.addEventListener("keydown", e=>{
    if(document.activeElement.id === "search-input") return;
    if(e.keyCode === 39) {
        if(document.getElementById("player-wrapper").style.height !== "100dvh") document.getElementById("search-input").focus();
    }
    // Tuş kontrolleri (yukarı/aşağı/büyütme)...
    if(e.keyCode===38 || e.keyCode===40){ /* Kanal değişimi mantığı buraya */ }
    if(e.keyCode===8 || e.keyCode===461){ document.getElementById("player-wrapper").style.height=(document.getElementById("player-wrapper").style.height==="100dvh"?"35vh":"100dvh"); }
});

veriCek();
</script>
</body>
</html>
