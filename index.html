<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Zec IPTV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100svh;background:#000;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%}

/* PLAYER */
#video-area{
display:flex;align-items:center;justify-content:center;background:#000;width:100%;height:35vh;
}
video{width:100%;height:100%;object-fit:contain}

/* CONTROLS */
.controls{flex:1;display:flex;flex-direction:column;padding:6px;min-height:0}

/* INPUT */
#in{padding:10px;border-radius:10px;border:1px solid #333;background:#111;color:#fff;text-align:center}

/* LIST */
#list{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;min-height:0}

/* GRUP BAŞLIKLARI */
.g-title{color:#ff2a6d;font-weight:bold;text-transform:uppercase;margin:8px 0 4px 0;text-align:center;font-size:0.8rem}

/* ITEM */
.item{
padding:8px 10px;margin:2px 0;border-radius:12px;
background:#111;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;color:#fff;
}
.item.active{background:#ff2a6d}
.item img{width:22px;height:22px;object-fit:contain;border-radius:2px}

/* FULLSCREEN */
.fullscreen #video-area{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10}
.fullscreen .controls{display:none}

/* TV LIST */
.tv-list{position:fixed;right:0;top:0;width:30%;height:100%;background:#000;z-index:20;display:none}
.tv-list.active{display:block}

/* YATAY EKRAN FLEX */
@media (orientation: landscape){
#app{flex-direction:row;}
#video-area{width:70%;height:100%;}
.controls{width:30%;height:100%;border-left:1px solid #1a1a1a;}
}
</style>
</head>
<body>

<div id="app">
<div id="video-area"></div>

<div class="controls">
<input id="in" placeholder="Kanal Ara / kanal sil / ekle|Grup|Ad|URL|Logo">
<div id="list"></div>
</div>

<div id="tvList" class="tv-list"></div>
</div>

<script>
let data={},flatList=[],activeIdx=0,hls=null;
let listOpen=false,hideTimer=null,navigating=false;

/* GRUP SIRALAMA */
const grupSirasi=[
"ulusal","sinema ve dizi","belgesel","ulusal haber","spor","çocuk & eğitim","yaşam & eğlence","yabancı haber","yabancı","müzik"
];

/* INIT */
async function init(){
try{
const res=await fetch("https://boru-pc-tv.vercel.app/");
const text=await res.text();
const json=JSON.parse(text.match(/const channelsData = ([\s\S]*?);/)[1]);

Object.keys(json).forEach(g=>{
if(g.toLowerCase()==="bilgilendirme") return;
data[g.toLowerCase()] = json[g];
});

render();
if(flatList.length) play(0);
}catch(e){console.error(e);}
}

/* GRUP SIRALAMA */
function getSortedGroups(){
const keys=Object.keys(data);
let ordered=[];
grupSirasi.forEach(g=>{
const found=keys.find(k=>k.toLowerCase()===g.toLowerCase());
if(found) ordered.push(found);
});
keys.forEach(k=>{if(!ordered.includes(k)) ordered.push(k);});
return ordered;
}

/* RENDER */
function render(){
const list=document.getElementById("list");
const tvList=document.getElementById("tvList");
const videoArea=document.getElementById("video-area");

list.innerHTML="";tvList.innerHTML="";videoArea.innerHTML="";flatList=[];

getSortedGroups().forEach(g=>{
let title=document.createElement("div");
title.className="g-title"; title.textContent=g;
list.appendChild(title);

data[g].forEach(c=>{
flatList.push(c);
let idx=flatList.length-1;

let div=document.createElement("div");
div.className="item";
div.innerHTML=`<img src="${c.logo||'https://via.placeholder.com/22'}"><span>${c.name}</span>`;
div.style.justifyContent="center";
div.onclick=()=>play(idx);
div.addEventListener("touchstart",()=>play(idx));

let tvDiv=div.cloneNode(true);
tvDiv.onclick=()=>play(idx);

list.appendChild(div);
tvList.appendChild(tvDiv);
});
});
}

/* PLAY */
function play(i){
activeIdx=i;
const videoArea=document.getElementById("video-area");
if(!document.getElementById("v")){
const video=document.createElement("video");
video.id="v"; video.controls=true; video.playsInline=true;
videoArea.appendChild(video);

/* ⚡ MOBİL PLAY/PAUSE DÜZELTME */
video.addEventListener("click",()=>{video.paused?video.play():video.pause();});
video.addEventListener("touchstart",()=>{video.paused?video.play():video.pause();});
}

const v=document.getElementById("v");
const url=flatList[i].url;

if(hls){hls.destroy();}
if(Hls.isSupported() && url.includes("m3u8")){
hls=new Hls();
hls.loadSource(url);
hls.attachMedia(v);
hls.on(Hls.Events.MANIFEST_PARSED,()=>v.play());
}else{
v.src=url; v.play();
}

highlight();
startCloseTimer();
}

/* ACTIVE */
function highlight(){
document.querySelectorAll(".item").forEach((el,i)=>{
el.classList.toggle("active",i===activeIdx);
});
}

/* TV FULLSCREEN */
function toggleFullscreenTV(){
const tvList=document.getElementById("tvList");
document.body.classList.add("fullscreen");
listOpen=true;
tvList.classList.add("active");
startCloseTimer();
}

/* LIST AUTO CLOSE */
function startCloseTimer(){
clearTimeout(hideTimer);
if(listOpen && !navigating){
hideTimer=setTimeout(()=>{closeList()},5000);
}
}

function openList(){listOpen=true;navigating=false;document.getElementById("tvList").classList.add("active");startCloseTimer();}
function closeList(){listOpen=false;document.getElementById("tvList").classList.remove("active");clearTimeout(hideTimer);}

/* PC / Mobil sağ tık ve enter iptal */
document.addEventListener("contextmenu",e=>e.preventDefault());
document.addEventListener("keydown",(e)=>{if(e.key==="Enter"){e.preventDefault();}});

/* TV REMOTE */
document.addEventListener("keydown",(e)=>{
const v=document.getElementById("v");

switch(e.key){
case "Enter":
if(document.activeElement.classList.contains("item") && !document.body.classList.contains("fullscreen")){
toggleFullscreenTV();
}
break;

case "Backspace":
if(document.body.classList.contains("fullscreen")){document.body.classList.remove("fullscreen");e.preventDefault();}
break;

case "ArrowUp":
if(listOpen){navigating=true;clearTimeout(hideTimer);}
else if(document.body.classList.contains("fullscreen")){play((activeIdx-1+flatList.length)%flatList.length);}
break;

case "ArrowDown":
if(listOpen){navigating=true;clearTimeout(hideTimer);}
else if(document.body.classList.contains("fullscreen")){play((activeIdx+1)%flatList.length);}
break;

case "ArrowRight":document.getElementById("in").focus();break;
case "ArrowLeft":v.currentTime-=5;break;
}
});

/* BASILI TUŞ */
let hold;
document.addEventListener("keydown",(e)=>{
const v=document.getElementById("v");
if(e.key==="ArrowRight"){hold=setInterval(()=>v.currentTime+=2,200);}
if(e.key==="ArrowLeft"){hold=setInterval(()=>v.currentTime-=2,200);}
});
document.addEventListener("keyup",()=>clearInterval(hold));

init();
</script>
</body>
</html>
